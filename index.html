<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy New Year</title>
    <style>
        body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #ff4ecd, #6a5cff);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: white;
    padding: 30px;
    width: 320px;
    text-align: center;
    border-radius: 15px;
    box-shadow: 0 15px 25px rgba(0,0,0,0.3);
}

.card h1 {
    color: #ff2f92;
}

.name {
    font-size: 18px;
    margin-bottom: 15px;
    color: #444;
}

#wish {
    font-size: 16px;
    color: #333;
    margin-bottom: 20px;
}

button {
    padding: 10px 18px;
    border: none;
    background: #ff2f92;
    color: white;
    font-size: 14px;
    border-radius: 20px;
    cursor: pointer;
}

button:hover {
    background: #e0267f;
}
    </style>
</head>
<body>

<div class="card">
    <h1>🎉 Happy Birthday dear 🎉</h1>
    <p class="name">Dear Bestie 💖</p>

    <p id="wish">
        Ek naya saal, nayi umeedein aur bohot sari khushiyan tumhare liye 💫
    </p>

    <button onclick="changeWish()">Click for a Surprise ✨</button>
</div>

<script src="script.js">
    function changeWish() {
    document.getElementById("wish").innerHTML =
        "Tumhari muskurahat hamesha yun hi chamakti rahe 😊<br>Allah tumhein sehat, kamyabi aur bohot saari khushiyan de 💕";
}

</script>
</body>
</html>
